<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="screen-orientation" content="portrait">
    <title>DUNG BATTLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --brown-dark: #3e2723;
            --brown-med: #5d4037;
            --brown-light: #8d6e63;
            --player-red: #d32f2f;
            --player-blue: #1976d2;
            --accent: #fbc02d;
            --bg: #e6dace;
            --card-bg: rgba(245, 238, 230, 0.95);
            --outline: #21100b;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Roboto Slab', serif;
            background-color: var(--bg);
            color: var(--brown-dark);
            overflow: hidden;
            touch-action: none;
            width: 100vw; 
            height: 100dvh;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        #app {
            width: 100%; 
            height: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            position: relative;
        }

        #welcome-dialog {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(230, 218, 206, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .welcome-card {
            background: var(--card-bg);
            padding: 35px 25px;
            border: 4px solid var(--outline);
            border-radius: 16px;
            box-shadow: 8px 8px 0px rgba(93, 64, 55, 0.4), 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        .welcome-card h2 {
            font-size: 2.2rem;
            color: var(--outline);
            margin-bottom: 15px;
            font-weight: 900;
            line-height: 1.1;
        }

        .welcome-card p {
            font-size: 1.15rem;
            color: var(--brown-dark);
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 700;
        }

        .welcome-card strong {
            color: var(--player-blue);
        }

        #btn-welcome-ok {
            margin: 0;
            width: 100%;
        }

        .screen {
            position: absolute;
            width: 100%; 
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 300ms ease;
            opacity: 0;
            padding: 20px;
            background-color: var(--bg);
            z-index: 10;
        }

        .screen.active { 
            display: flex; 
            opacity: 1; 
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border: 4px solid var(--outline);
            border-radius: 16px;
            box-shadow: 8px 8px 0px rgba(93, 64, 55, 0.4), 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px; 
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            margin-bottom: 20px; 
            color: var(--outline); 
            letter-spacing: -1px; 
            line-height: 1; 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 3px solid var(--outline);
            border-radius: 10px;
            font-family: 'Roboto Slab', serif;
            font-size: 1.2rem;
            font-weight: 700;
            outline: none;
            text-align: center;
            background-color: #f7f0e8;
            color: var(--brown-dark);
            user-select: auto;
            -webkit-user-select: auto;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
            transition: border-color 0.2s;
        }
        
        input:focus, select:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(145deg, var(--accent), #f57f17);
            border: 3px solid var(--outline);
            border-radius: 10px;
            font-family: 'Roboto Slab', serif;
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--outline);
            transition: transform 0.1s, box-shadow 0.1s, filter 0.1s;
            color: var(--outline);
        }

        button:hover { 
            filter: brightness(1.1);
        }
        
        button:active { 
            transform: translate(3px, 3px); 
            box-shadow: 1px 1px 0px var(--outline); 
        }
        
        button:disabled { 
            background: #e0d4c8; 
            cursor: not-allowed; 
            box-shadow: none; 
            transform: none; 
            border-color: #bcaaa4;
            color: #8d6e63;
        }

        .room-display-container {
            background: #e0d4c8;
            border: 3px dashed var(--brown-med);
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.05);
        }

        #display-room-id { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--brown-dark); 
            display: block; 
            letter-spacing: 2px;
        }

        #game-container {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background: var(--brown-dark);
            display: none;
            z-index: 5;
            padding-bottom: env(safe-area-inset-bottom);
        }

        canvas { 
            display: block; 
            margin: auto; 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        .hud {
            position: absolute;
            top: max(20px, env(safe-area-inset-top)); 
            width: 100%;
            display: flex; 
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 20;
            flex-direction: row;
            align-items: center;
        }

        .score {
            font-size: 2.2rem; 
            font-weight: 900; 
            color: white;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(255,255,255,0.6); 
            border-radius: 50%;
            background-color: var(--outline);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0.85;
        }
        .score-red { background: linear-gradient(135deg, rgba(211, 47, 47, 0.8), rgba(183, 28, 28, 0.8)); border-color: rgba(255, 138, 128, 0.7); }
        .score-blue { background: linear-gradient(135deg, rgba(25, 118, 210, 0.8), rgba(13, 71, 161, 0.8)); border-color: rgba(130, 177, 255, 0.7); }

        #joystick-base {
            position: absolute;
            display: block; 
            bottom: max(60px, calc(env(safe-area-inset-bottom) + 20px)); 
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            z-index: 50;
            pointer-events: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), inset 0 4px 10px rgba(255,255,255,0.1);
        }

        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3), inset -2px -2px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(33, 16, 11, 0.85);
            backdrop-filter: blur(5px);
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            z-index: 100;
        }
        
        #instruction-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 4px solid var(--outline);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--brown-dark);
            z-index: 80;
            display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 85%;
            max-width: 420px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #instruction-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .status-msg { margin: 10px 0; font-weight: 700; color: #43a047; font-size: 1.1rem; }
        .error-msg { color: #d32f2f; font-weight: 700; margin-top: 10px; font-size: 1.1rem; }
        
        .fs-btn, .sound-btn {
            position: fixed; 
            right: max(15px, env(safe-area-inset-right));
            width: 45px; 
            height: 45px;
            background: transparent;
            border: none;
            z-index: 200; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: transform 0.1s;
        }
        
        .fs-btn svg, .sound-btn svg {
            filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.4));
            stroke: rgba(255,255,255,0.9);
        }

        .sound-btn { top: max(75px, calc(env(safe-area-inset-top) + 60px)); }
        
        .fs-btn { 
            top: max(15px, env(safe-area-inset-top)); 
            background: rgba(244, 143, 177, 0.45); 
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .fs-btn svg {
            stroke: var(--brown-dark);
            filter: none;
        }
        
        .fs-btn:active, .sound-btn:active { 
            transform: scale(0.9);
        }

        .fs-tooltip {
            position: fixed;
            top: max(22px, calc(env(safe-area-inset-top) + 7px));
            right: max(65px, calc(env(safe-area-inset-right) + 50px));
            background: rgba(33, 16, 11, 0.85);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            pointer-events: none;
            z-index: 199;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            opacity: 1;
            transform: translateX(0);
            animation: fadeOutTooltip 4s forwards;
            animation-delay: 2s;
        }

        .fs-tooltip::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -5px;
            transform: translateY(-50%);
            border-width: 5px 0 5px 5px;
            border-style: solid;
            border-color: transparent transparent transparent rgba(33, 16, 11, 0.85);
        }

        @keyframes fadeOutTooltip {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(15px); visibility: hidden; }
        }
        
        .lobby-team-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #fdfaf7;
            border: 2px solid #e0d4c8;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        
        .team-btn {
            padding: 6px 12px;
            font-size: 0.9rem;
            margin: 0 3px;
            width: auto;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        
        .team-btn.red { background: #ffebee; border-color: #d32f2f; color: #d32f2f; }
        .team-btn.blue { background: #e3f2fd; border-color: #1976d2; color: #1976d2; }

        #exit-dialog {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .exit-card {
            background: var(--card-bg);
            padding: 30px;
            border: 4px solid var(--outline);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        .exit-card h2 {
            font-size: 1.8rem;
            color: var(--brown-dark);
            margin-bottom: 25px;
        }

        .exit-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .exit-buttons button {
            margin: 0;
            flex: 1;
            font-size: 1.1rem;
            padding: 12px;
            box-shadow: 2px 2px 0px var(--outline);
        }

        #btn-exit-cancel { background: linear-gradient(145deg, #f5eadd, #d6c6b7); color: #333; }
        #btn-exit-ok { background: linear-gradient(145deg, var(--player-red), #b71c1c); color: white; border-color: #8e0000; }

        @media screen and (orientation: landscape) {
            body::before {
                content: "Please rotate your device to portrait mode";
                position: fixed;
                inset: 0;
                background: var(--outline);
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 24px;
                font-weight: bold;
                z-index: 9999;
                text-align: center;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
  <div class="fs-tooltip" id="fs-tip">Click to Full View</div>
  <div class="fs-btn" id="btn-fs">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
  </div>
  <div class="sound-btn" id="btn-sound">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
  </div>

<div id="app">
    <div id="welcome-dialog">
        <div class="welcome-card">
            <h2>Welcome to Dung Battle!</h2>
            <p><strong>Play in Full Screen on iPhone:</strong><br>
Tap the <strong>Share</strong> icon, select <strong>"Add to Home Screen"</strong>, then open the game from your Home Screen to play without browser interruptions.</p>
            <button id="btn-welcome-ok">OK, LET'S PLAY!</button>
        </div>
    </div>

    <div id="screen-home" class="screen active">
        <div class="card">
            <h1>DUNG BATTLE</h1>
            <input type="text" id="input-name" placeholder="YOUR NAME" maxlength="12" autocomplete="off">
            <button id="btn-create">CREATE ROOM</button>
            <div style="font-weight: 900; margin: 20px 0; color: var(--brown-med); opacity: 0.7;">━ OR ━</div>
            <input type="text" id="input-room-id" placeholder="6-DIGIT ID" maxlength="6" autocomplete="off">
            <button id="btn-join">JOIN ROOM</button>
            <div id="home-error" class="error-msg"></div>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <div class="card">
            <h2 style="font-size: 1.2rem; color: var(--brown-med);">ROOM ID</h2>
            <div class="room-display-container">
                <span id="display-room-id">------</span>
            </div>
            <button id="btn-copy" style="font-size: 0.9rem; padding: 10px; width: 160px; margin: 0 auto 20px;">COPY ID</button>
            
            <div id="host-controls" style="display: none; margin-bottom: 20px; padding-top: 15px; border-top: 2px dashed #bcaaa4;">
                <label style="font-weight: bold; font-size: 0.9rem; color: var(--brown-med);">POINTS TO WIN:</label>
                <select id="win-points-select" style="padding: 10px; font-size: 1rem; margin-top: 8px;">
                    <option value="3">3 Points</option>
                    <option value="5" selected>5 Points</option>
                    <option value="7">7 Points</option>
                    <option value="10">10 Points</option>
                </select>
            </div>

            <div id="player-list" style="text-align: left; background: #f2e9e0; padding: 12px; border-radius: 10px; border: 2px solid #e0d4c8; min-height: 150px; max-height: 250px; overflow-y: auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                </div>
            <div id="lobby-status" class="status-msg">Waiting...</div>
            <button id="btn-start" disabled style="display: none; background: linear-gradient(145deg, #4caf50, #2e7d32); color: white; border-color: #1b5e20;">START BATTLE</button>

    <div id="game-container">
        <div class="hud">
            <div id="score-red" class="score score-red">0</div>
            <div id="score-blue" class="score score-blue">0</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>

        <div id="instruction-popup"></div>

        <div id="overlay">
            <h1 id="win-text" style="color: white; font-size: 4.5rem; margin-bottom: 40px; text-align: center; text-shadow: 0 10px 20px rgba(0,0,0,0.5);"></h1>

    <div id="exit-dialog">

                <button id="btn-exit-cancel">Cancel</button>
                <button id="btn-exit-ok">OK</button>

        </div>

</div>

<script>
const AudioSystem = {
    sounds: [
        'https://www.myinstants.com/media/sounds/tudum-tedev.mp3',
        'https://www.myinstants.com/media/sounds/pehchana-mujhe.mp3',
        'https://www.myinstants.com/media/sounds/mat-kar-beta-mat-kar-emiway-bantai.mp3',
        'https://www.myinstants.com/media/sounds/ab-tu-gaya-beta-ab-dekh-tu-puneet.mp3',
        'https://www.myinstants.com/media/sounds/hacker-hai-bhai-hacker-ajjubhai.mp3'
    ],
    players: [],
    currentAudio: null,
    isGoalMuted: false, 
    audioCtx: null,
    
    init() {
        this.sounds.forEach(src => {
            const audio = new Audio(src);
            audio.load();
            this.players.push(audio);
        });
    },
    
    playSequential(turn) {
        if (this.isGoalMuted) return;
        
        if (this.currentAudio) {
            this.currentAudio.pause();
            this.currentAudio.currentTime = 0;
        }

        if (this.players.length === 0) return;

        const index = turn % this.players.length;
        const audio = this.players[index];
        
        this.currentAudio = audio;
        audio.currentTime = 0;
        audio.play().catch(() => {});
    },

    playBallHit(intensity) {
        if (this.isGoalMuted) return;
        try {
            if (!this.audioCtx) {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            const ctx = this.audioCtx;
            if (ctx.state === 'suspended') ctx.resume();

            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();

            const vol = Math.max(0.02, Math.min(0.5, intensity * 0.5)); 
            const startFreq = 80 + (vol * 150); 

            osc.type = 'sine';
            osc.frequency.setValueAtTime(startFreq, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(vol, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);

            osc.connect(gainNode);
            gainNode.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    },

    toggleMute() {
        this.isGoalMuted = !this.isGoalMuted;
        const btn = document.getElementById('btn-sound');
        if (this.isGoalMuted) {
            btn.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`;
        } else {
            btn.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
        }
    }
};

const Net = {
    peer: null,
    connections: {}, 
    hostConn: null,  
    isHost: false,
    myId: null,
    room: null,
    myName: '',
    players: {}, 
    maxScore: 5,
    
    cfg: {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' }
        ]
    },

    init(isHost, roomId) {
        this.isHost = isHost;
        this.myName = document.getElementById('input-name').value.trim() || (isHost ? "Host" : `Player_${Math.floor(Math.random()*100)}`);
        
        const peerId = isHost ? roomId : `GUEST-${Math.floor(Math.random() * 9999999)}`;
        this.peer = new Peer(peerId, { config: this.cfg });

        this.peer.on('open', (id) => {
            this.myId = id;
            this.room = isHost ? id : roomId; 
            
            UI.go('lobby');
            document.getElementById('display-room-id').innerText = this.room;
            
            if (isHost) {
                document.getElementById('lobby-status').innerText = "Waiting for players...";
                document.getElementById('host-controls').style.display = 'block';
                document.getElementById('btn-start').style.display = 'block';
                
                this.players[id] = { name: this.myName, team: 'red', isHost: true };
                this.updateLobbyUI();
            } else {
                document.getElementById('lobby-status').innerText = "Connecting to host...";
                this.connectToHost(roomId);
            }
        });

        this.peer.on('connection', (conn) => {
            if (!this.isHost) { conn.close(); return; }
            if (Object.keys(this.connections).length >= 7) {
                conn.send({ t: 'ERROR', d: 'Room is full' });
                setTimeout(() => conn.close(), 500);
                return;
            }
            this.setupHostConnection(conn);
        });

        this.peer.on('error', (err) => {
            document.getElementById('home-error').innerText = "Network Error / Connection Failed";
            if (!document.getElementById('screen-home').classList.contains('active')) UI.go('home');
        });
    },

    connectToHost(hostId, retries = 3) {
        this.hostConn = this.peer.connect(hostId, { reliable: true }); 
        
        const connTimeout = setTimeout(() => {
            if (!this.hostConn || !this.hostConn.open) {
                if (retries > 0) {
                    document.getElementById('lobby-status').innerText = `Retrying connection... (${retries})`;
                    this.connectToHost(hostId, retries - 1);
                } else {
                    document.getElementById('home-error').innerText = "Could not reach host. Check ID.";
                    UI.go('home');
                }
            }
        }, 5000);

        this.hostConn.on('open', () => {
            clearTimeout(connTimeout);
            document.getElementById('lobby-status').innerText = "Connected to Host!";
            this.sendToHost('JOIN', { name: this.myName });
        });

        this.hostConn.on('data', (data) => this.handleClientMsg(data));
        this.hostConn.on('close', () => { alert("Connection to host lost"); location.reload(); });
        this.hostConn.on('error', (err) => console.error(err));
    },

    setupHostConnection(conn) {
        conn.on('open', () => { this.connections[conn.peer] = conn; });
        conn.on('data', (data) => { this.handleHostMsg(conn.peer, data); });
        conn.on('close', () => {
            delete this.connections[conn.peer];
            delete this.players[conn.peer];
            if (Game.running) delete Game.activePlayers[conn.peer];
            this.broadcastLobbyState();
        });
    },

    sendToHost(type, data) {
        if (this.hostConn && this.hostConn.open) {
            this.hostConn.send({ t: type, d: data });
        }
    },

    handleClientMsg(msg) {
        switch(msg.t) {
            case 'LOBBY_STATE':
                this.players = msg.d.players;
                this.maxScore = msg.d.maxScore;
                this.updateLobbyUI();
                break;
            case 'START_GAME':
                this.maxScore = msg.d.maxScore;
                Game.begin(msg.d.players);
                break;
            case 'GAME_STATE':
                Game.remoteSync(msg.d);
                break;
            case 'GOAL':
                Game.gameScore = msg.d.score;
                Game.goalEffect(msg.d.team);
                break;
            case 'END_GAME':
                Game.gameScore = msg.d.score;
                Game.endGame(msg.d.winner);
                break;
            case 'ERROR':
                alert(msg.d);
                location.reload();
                break;
        }
    },

    broadcast(type, data, excludePeerId = null) {
        for (let peerId in this.connections) {
            if (peerId !== excludePeerId && this.connections[peerId].open) {
                this.connections[peerId].send({ t: type, d: data });
            }
        }
    },

    handleHostMsg(peerId, msg) {
        switch(msg.t) {
            case 'JOIN':
                let redCount = 0, blueCount = 0;
                for(let id in this.players) {
                    if(this.players[id].team === 'red') redCount++;
                    else blueCount++;
                }
                const team = redCount <= blueCount ? 'red' : 'blue';
                this.players[peerId] = { name: msg.d.name, team: team, isHost: false };
                this.broadcastLobbyState();
                break;
            case 'PLAYER_INPUT':
                if(Game.running && Game.activePlayers[peerId]) {
                    Game.activePlayers[peerId].input = msg.d;
                }
                break;
        }
    },

    broadcastLobbyState() {
        if (!this.isHost) return;
        this.updateLobbyUI();
        this.broadcast('LOBBY_STATE', { 
            players: this.players,
            maxScore: parseInt(document.getElementById('win-points-select').value)
        });
        document.getElementById('btn-start').disabled = Object.keys(this.players).length < 2;
    },

    changeTeam(playerId, newTeam) {
        if (!this.isHost || !this.players[playerId]) return;
        this.players[playerId].team = newTeam;
        this.broadcastLobbyState();
    },

    updateLobbyUI() {
        const list = document.getElementById('player-list');
        list.innerHTML = '';
        
        for (let id in this.players) {
            const p = this.players[id];
            const div = document.createElement('div');
            div.className = 'lobby-team-control';
            
            let html = `<span style="font-weight:700; color: ${p.team === 'red' ? '#d32f2f' : '#1976d2'}; text-transform: uppercase;">
                ${p.team === 'red' ? '🔴' : '🔵'} ${p.name} ${p.isHost ? '(HOST)' : ''} ${id === this.myId ? '(YOU)' : ''}
            </span>`;
            
            if (this.isHost) {
                html += `<div>
                    <button class="team-btn red" onclick="Net.changeTeam('${id}', 'red')">RED</button>
                    <button class="team-btn blue" onclick="Net.changeTeam('${id}', 'blue')">BLUE</button>
                </div>`;
            }
            
            div.innerHTML = html;
            list.appendChild(div);
        }
    }
};

const UI = {
    go(id) {
        document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
        document.getElementById('game-container').style.display = 'none';
        if (id === 'game') {
            document.getElementById('game-container').style.display = 'block';
        } else {
            const target = document.getElementById('screen-' + id);
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 50);
        }
    }
};

const Game = {
    cvs: null, ctx: null,
    w: 700, h: 1000,
    running: false,
    gameScore: { red: 0, blue: 0 },
    
    activePlayers: {}, 
    ball: { x: 350, y: 500, vx: 0, vy: 0, r: 35, targetX: 350, targetY: 500 },
    particles: [],
    
    joystick: { active: false, maxRadius: 55, dx: 0, dy: 0, id: null },
    joystickCenter: { x: 0, y: 0 },
    lastSyncTime: 0,
    lastTime: 0,
    animationFrameId: null,
    
    wasTouching: false,
    lastBallX: 350,
    lastBallY: 500,
    lastMx: 0,
    lastMy: 0,
    lastInputTime: 0,

    init() {
        this.cvs = document.getElementById('gameCanvas');
        this.ctx = this.cvs.getContext('2d', { alpha: false });
        this.fit();
        window.addEventListener('resize', () => {
            this.fit();
            this.updateJoystickCenter();
        });
        this.setupJoystick();
    },

    fit() {
        const availableW = window.innerWidth;
        const availableH = window.innerHeight;
        const scale = Math.min(availableW / this.w, availableH / this.h);
        this.cvs.width = this.w; 
        this.cvs.height = this.h;
        this.cvs.style.width = (this.w * scale) + 'px';
        this.cvs.style.height = (this.h * scale) + 'px';
    },

    updateJoystickCenter() {
        const base = document.getElementById('joystick-base');
        if (base) {
            const rect = base.getBoundingClientRect();
            if (rect.width > 0) {
                this.joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            }
        }
    },
    
    setupJoystick() {
        const zone = document.getElementById('game-container');
        const stick = document.getElementById('joystick-stick');

        const handleMove = (e) => {
            if (!this.joystick.active) return;
            e.preventDefault();
            
            let clientX, clientY;
            if (e.touches) {
                let touchFound = false;
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === this.joystick.id) {
                        clientX = e.touches[i].clientX;
                        clientY = e.touches[i].clientY;
                        touchFound = true;
                        break;
                    }
                }
                if (!touchFound) return;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            let dx = clientX - this.joystickCenter.x;
            let dy = clientY - this.joystickCenter.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            let visualDx = dx, visualDy = dy;
            if (dist > this.joystick.maxRadius) {
                visualDx = (dx / dist) * this.joystick.maxRadius;
                visualDy = (dy / dist) * this.joystick.maxRadius;
                dx = visualDx;
                dy = visualDy;
            }

            // Move the stick visually
            stick.style.transform = `translate(calc(-50% + ${visualDx}px), calc(-50% + ${visualDy}px))`;
            this.joystick.dx = dx;
            this.joystick.dy = dy;
        };

        const handleStart = (e) => {
            if (e.target.closest('.hud') || e.target.closest('.fs-btn') || e.target.closest('.sound-btn') || e.target.closest('#overlay')) return;
            if (this.joystick.active) return;
            
            this.updateJoystickCenter(); // Recalculate precisely on touch start
            
            this.joystick.active = true;
            if (e.touches) this.joystick.id = e.changedTouches[0].identifier;
            stick.style.transition = 'none';
            handleMove(e);
        };

        const handleEnd = (e) => {
            if (!this.joystick.active) return;
            if (e.touches) {
                let stillActive = false;
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === this.joystick.id) stillActive = true;
                }
                if (stillActive) return;
            }
            
            this.joystick.active = false;
            this.joystick.dx = 0;
            this.joystick.dy = 0;
            this.joystick.id = null;
            stick.style.transition = 'transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1)';
            stick.style.transform = `translate(-50%, -50%)`;
        };

        zone.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);
        window.addEventListener('touchcancel', handleEnd);
        
        zone.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
    },

    spawnParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            this.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                r: Math.random() * 4 + 2,
                color: color,
                alpha: 1,
                decay: Math.random() * 0.05 + 0.02
            });
        }
    },

    begin(playerData) {
        if (this.animationFrameId) cancelAnimationFrame(this.animationFrameId);

        this.gameScore = { red: 0, blue: 0 };
        this.activePlayers = {};
        this.particles = [];
        this.wasTouching = false;
        let myTeam = 'red';

        for(let id in playerData) {
            const p = playerData[id];
            if(id === Net.myId) myTeam = p.team;
            
            this.activePlayers[id] = {
                id: id,
                name: p.name,
                team: p.team,
                color: p.team === 'red' ? '#e53935' : '#1e88e5',
                r: 40,
                x: 350, y: 500,
                targetX: 350, targetY: 500,
                input: { mx: 0, my: 0 }
            };
        }
        
        this.resetPositions();
        this.syncScoreUI();

        this.lastBallX = this.ball.x;
        this.lastBallY = this.ball.y;
        this.lastMx = 0;
        this.lastMy = 0;

        if (myTeam === 'blue') {
            this.cvs.style.transform = 'rotate(180deg)';
        } else {
            this.cvs.style.transform = 'none';
        }

        const popup = document.getElementById('instruction-popup');
        if (myTeam === 'red') {
            popup.innerHTML = "SCORE IN THE<br><span style='color: var(--player-blue)'>BLUE GOAL!</span>";
        } else {
            popup.innerHTML = "SCORE IN THE<br><span style='color: var(--player-red)'>RED GOAL!</span>";
        }
        popup.style.display = 'block';
        setTimeout(() => popup.classList.add('show'), 50);
        setTimeout(() => {
            popup.classList.remove('show');
            setTimeout(() => popup.style.display = 'none', 300);
        }, 2500);

        const controls = document.getElementById('post-game-controls');
        if (Net.isHost) {
            controls.innerHTML = `
                <button id="btn-rematch" style="background: linear-gradient(145deg, var(--accent), #f57f17);">REMATCH</button>
                <button id="btn-lobby" style="background: linear-gradient(145deg, #f5eadd, #d6c6b7); color: #333;">LOBBY / EXIT</button>
            `;
            document.getElementById('btn-rematch').onclick = () => {
                Net.broadcast('START_GAME', { players: Net.players, maxScore: Net.maxScore });
                this.begin(Net.players);
            };
            document.getElementById('btn-lobby').onclick = () => {
                Net.broadcast('ERROR', 'Host closed the game.');
                location.reload();
            };
        } else {
            controls.innerHTML = `<button onclick="location.reload()" style="background: linear-gradient(145deg, #f5eadd, #d6c6b7); color: #333;">EXIT GAME</button>`;
        }

        this.running = true;
        document.getElementById('overlay').style.display = 'none';
        UI.go('game');
        
        // Ensure joystick is calibrated when switching to game view
        setTimeout(() => this.updateJoystickCenter(), 100);

        this.lastTime = performance.now();
        this.animationFrameId = requestAnimationFrame((t) => this.loop(t));
    },

    resetPositions() {
        this.ball.x = 350; this.ball.y = 500;
        this.ball.vx = 0; this.ball.vy = 0;
        this.ball.targetX = 350; this.ball.targetY = 500;
        
        let redIdx = 0, blueIdx = 0;
        for(let id in this.activePlayers) {
            const p = this.activePlayers[id];
            if(p.team === 'red') {
                p.x = 250 + (redIdx % 3) * 100;
                p.y = 850 - Math.floor(redIdx/3)*100;
                redIdx++;
            } else {
                p.x = 250 + (blueIdx % 3) * 100;
                p.y = 150 + Math.floor(blueIdx/3)*100;
                blueIdx++;
            }
            p.targetX = p.x;
            p.targetY = p.y;
            p.input = { mx: 0, my: 0 };
        }
    },

    update(dt) {
        if (!this.running) return;
        const fps60 = dt * 60;

        let mx = 0, my = 0;
        if (this.joystick.dx !== 0 || this.joystick.dy !== 0) {
            const dist = Math.sqrt(this.joystick.dx**2 + this.joystick.dy**2);
            // Implement Deadzone for stability
            if (dist > 5) {
                const normalizedDist = Math.min(dist / this.joystick.maxRadius, 1);
                const factor = normalizedDist; 
                
                mx = (this.joystick.dx / dist) * factor;
                my = (this.joystick.dy / dist) * factor;
            }

            if (this.activePlayers[Net.myId] && this.activePlayers[Net.myId].team === 'blue') {
                mx = -mx;
                my = -my;
            }
        }

        // Round inputs to 2 decimal places to prevent micro-jitter and network spam
        mx = Math.round(mx * 100) / 100;
        my = Math.round(my * 100) / 100;

        if(this.activePlayers[Net.myId]) {
            this.activePlayers[Net.myId].input = { mx, my };
        }

        if (!Net.isHost) {
            const now = Date.now();
            // Send input to host only if it changed significantly or as a heartbeat every 50ms
            if (mx !== this.lastMx || my !== this.lastMy || now - (this.lastInputTime || 0) > 50) {
                Net.sendToHost('PLAYER_INPUT', { mx, my });
                this.lastMx = mx;
                this.lastMy = my;
                this.lastInputTime = now;
            }
            
            const ballLerp = 1 - Math.pow(1 - 0.4, fps60);
            this.ball.x += (this.ball.targetX - this.ball.x) * ballLerp;
            this.ball.y += (this.ball.targetY - this.ball.y) * ballLerp;

            for(let id in this.activePlayers) {
                let p = this.activePlayers[id];
                if (id === Net.myId) {
                    const speedFactor = 600 * dt; 
                    p.x += p.input.mx * speedFactor;
                    p.y += p.input.my * speedFactor;
                    
                    p.x = Math.max(p.r, Math.min(this.w - p.r, p.x));
                    p.y = Math.max(p.r, Math.min(this.h - p.r, p.y));

                    const correctionLerp = 1 - Math.pow(1 - 0.15, fps60);
                    p.x += (p.targetX - p.x) * correctionLerp;
                    p.y += (p.targetY - p.y) * correctionLerp;
                } else {
                    const pLerp = 1 - Math.pow(1 - 0.6, fps60);
                    p.x += (p.targetX - p.x) * pLerp;
                    p.y += (p.targetY - p.y) * pLerp;
                }
            }
        } else {
            this.hostPhysics(dt);
        }

        for(let i = this.particles.length - 1; i >= 0; i--) {
            let pt = this.particles[i];
            pt.x += pt.vx;
            pt.y += pt.vy;
            pt.vx *= 0.9;
            pt.vy *= 0.9;
            pt.alpha -= pt.decay;
            if(pt.alpha <= 0) this.particles.splice(i, 1);
        }

        if (this.activePlayers[Net.myId]) {
            const p = this.activePlayers[Net.myId];
            const dx = this.ball.x - p.x;
            const dy = this.ball.y - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < this.ball.r + p.r + 5) {
                if (!this.wasTouching) {
                    const playerSpeed = Math.sqrt(p.input.mx**2 + p.input.my**2);
                    const bdx = this.ball.x - (this.lastBallX || this.ball.x);
                    const bdy = this.ball.y - (this.lastBallY || this.ball.y);
                    const ballSpeed = Math.sqrt(bdx*bdx + bdy*bdy) / (dt * 60) || 0;
                    
                    let intensity = (playerSpeed * 0.7) + (ballSpeed / 20 * 0.3);
                    AudioSystem.playBallHit(intensity);
                    
                    if (window.navigator && window.navigator.vibrate && intensity > 0.2) {
                        navigator.vibrate(15);
                    }
                    this.spawnParticles(this.ball.x - dx/2, this.ball.y - dy/2, 'rgba(255,255,255,0.8)', 6);

                    this.wasTouching = true;
                }
            } else {
                this.wasTouching = false;
            }
        }

        this.lastBallX = this.ball.x;
        this.lastBallY = this.ball.y;
    },

    hostPhysics(dt) {
        const speedFactor = 600 * dt;
        const fps60 = dt * 60;

        for(let id in this.activePlayers) {
            const p = this.activePlayers[id];
            p.x += p.input.mx * speedFactor;
            p.y += p.input.my * speedFactor;
            p.x = Math.max(p.r, Math.min(this.w - p.r, p.x));
            p.y = Math.max(p.r, Math.min(this.h - p.r, p.y));
            p.targetX = p.x;
            p.targetY = p.y;
        }

        this.ball.x += this.ball.vx * fps60;
        this.ball.y += this.ball.vy * fps60;
        
        this.ball.vx *= Math.pow(0.975, fps60); 
        this.ball.vy *= Math.pow(0.975, fps60);
        this.ball.targetX = this.ball.x;
        this.ball.targetY = this.ball.y;

        const goalWidth = 220;
        const goalLeft = (this.w - goalWidth) / 2;
        const goalRight = goalLeft + goalWidth;

        if (this.ball.x > goalLeft && this.ball.x < goalRight) {
            if (this.ball.y <= this.ball.r) {
                this.gameScore.red++;
                this.onGoal('red');
                return;
            }
            if (this.ball.y >= this.h - this.ball.r) {
                this.gameScore.blue++;
                this.onGoal('blue');
                return;
            }
        } 
        
        if (this.ball.x < this.ball.r || this.ball.x > this.w - this.ball.r) {
            this.ball.vx *= -0.7;
            this.ball.x = this.ball.x < this.ball.r ? this.ball.r : this.w - this.ball.r;
        }
        if (this.ball.y < this.ball.r || this.ball.y > this.h - this.ball.r) {
            this.ball.vy *= -0.7;
            this.ball.y = this.ball.y < this.ball.r ? this.ball.r : this.h - this.ball.r;
        }

        for(let id in this.activePlayers) {
            const p = this.activePlayers[id];
            const dx = this.ball.x - p.x;
            const dy = this.ball.y - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < this.ball.r + p.r) {
                const angle = Math.atan2(dy, dx);
                const playerSpeed = Math.sqrt(p.input.mx**2 + p.input.my**2);
                
                const force = 2.5 + (playerSpeed * 6);
                const cappedForce = Math.min(force, 16);

                this.ball.vx = Math.cos(angle) * cappedForce;
                this.ball.vy = Math.sin(angle) * cappedForce;
                
                this.ball.x = p.x + Math.cos(angle) * (this.ball.r + p.r + 1);
                this.ball.y = p.y + Math.sin(angle) * (this.ball.r + p.r + 1);
            }
        }

        const now = Date.now();
        // Slightly faster sync rate to keep clients extremely smooth
        if (now - this.lastSyncTime > 40) {
            const state = {
                b: { x: this.ball.x, y: this.ball.y },
                p: {}
            };
            for(let id in this.activePlayers) {
                state.p[id] = { x: this.activePlayers[id].x, y: this.activePlayers[id].y };
            }
            Net.broadcast('GAME_STATE', state);
            this.lastSyncTime = now;
        }
    },

    onGoal(scoringTeam) {
        Net.broadcast('GOAL', { score: this.gameScore, team: scoringTeam });
        this.goalEffect(scoringTeam);
        if (this.gameScore.red >= Net.maxScore || this.gameScore.blue >= Net.maxScore) {
            const winner = this.gameScore.red >= Net.maxScore ? 'RED' : 'BLUE';
            Net.broadcast('END_GAME', { score: this.gameScore, winner: winner });
            this.endGame(winner);
        }
    },

    goalEffect(scoringTeam) {
        const totalGoals = this.gameScore.red + this.gameScore.blue;
        const turn = Math.max(0, totalGoals - 1);
        
        AudioSystem.playSequential(turn);
        if (window.navigator && window.navigator.vibrate) navigator.vibrate([50, 50, 100]);
        
        this.spawnParticles(this.w/2, scoringTeam === 'red' ? 50 : this.h - 50, scoringTeam === 'red' ? '#e53935' : '#1e88e5', 40);

        this.syncScoreUI();
        this.resetPositions();
    },

    remoteSync(state) {
        if (Net.isHost) return;
        this.ball.targetX = state.b.x;
        this.ball.targetY = state.b.y;
        for(let id in state.p) {
            if(this.activePlayers[id]) {
                this.activePlayers[id].targetX = state.p[id].x;
                this.activePlayers[id].targetY = state.p[id].y;
            }
        }
    },

    syncScoreUI() {
        document.getElementById('score-red').innerText = this.gameScore.red;
        document.getElementById('score-blue').innerText = this.gameScore.blue;
    },

    endGame(winner) {
        this.running = false;
        document.getElementById('win-text').innerText = `${winner} WINS!`;
        document.getElementById('win-text').style.color = winner === 'RED' ? '#ff8a80' : '#82b1ff';
        document.getElementById('overlay').style.display = 'flex';
    },

    draw() {
        if(!this.ctx) return;
        const c = this.ctx;
        
        c.fillStyle = '#4e342e';
        c.fillRect(0,0,this.w,this.h);

        c.strokeStyle = 'rgba(255,255,255,0.03)';
        c.lineWidth = 2;
        for(let i=0; i<this.w; i+=40) { c.beginPath(); c.moveTo(i,0); c.lineTo(i,this.h); c.stroke(); }
        for(let j=0; j<this.h; j+=40) { c.beginPath(); c.moveTo(0,j); c.lineTo(this.w,j); c.stroke(); }
        
        c.strokeStyle = 'rgba(255,255,255,0.1)';
        c.lineWidth = 4;
        c.beginPath(); c.moveTo(0, this.h/2); c.lineTo(this.w, this.h/2); c.stroke();
        c.beginPath(); c.arc(this.w/2, this.h/2, 80, 0, Math.PI*2); c.stroke();

        const goalWidth = 220;
        const goalLeft = (this.w - goalWidth) / 2;
        
        const gBlue = c.createLinearGradient(0, 0, 0, 40);
        gBlue.addColorStop(0, 'rgba(21, 101, 192, 0.9)');
        gBlue.addColorStop(1, 'rgba(13, 71, 161, 0.9)');
        c.fillStyle = gBlue;
        c.beginPath(); c.roundRect(goalLeft, 0, goalWidth, 40, [0,0,12,12]); c.fill();
        c.strokeStyle = 'rgba(255,255,255,0.2)'; c.lineWidth = 2; c.stroke();
        
        const gRed = c.createLinearGradient(0, this.h - 40, 0, this.h);
        gRed.addColorStop(0, 'rgba(198, 40, 40, 0.9)');
        gRed.addColorStop(1, 'rgba(183, 28, 28, 0.9)');
        c.fillStyle = gRed;
        c.beginPath(); c.roundRect(goalLeft, this.h - 40, goalWidth, 40, [12,12,0,0]); c.fill();
        c.stroke();

        for(let i=0; i<this.particles.length; i++) {
            let pt = this.particles[i];
            c.globalAlpha = pt.alpha;
            c.fillStyle = pt.color;
            c.beginPath(); c.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); c.fill();
        }
        c.globalAlpha = 1.0;

        c.save();
        c.translate(this.ball.x, this.ball.y);
        
        c.fillStyle = 'rgba(0,0,0,0.3)';
        c.beginPath(); c.arc(0, 6, this.ball.r, 0, Math.PI*2); c.fill();
        
        const bGrad = c.createRadialGradient(-10, -10, 5, 0, 0, this.ball.r);
        bGrad.addColorStop(0, '#795548');
        bGrad.addColorStop(1, '#21100b');
        c.fillStyle = bGrad;
        
        c.beginPath(); c.arc(0,0,this.ball.r,0,Math.PI*2); c.fill();
        
        c.strokeStyle = 'rgba(0,0,0,0.5)';
        c.lineWidth = 3;
        c.stroke();
        
        c.fillStyle = 'rgba(0,0,0,0.2)';
        c.beginPath(); c.arc(0, 0, this.ball.r/2, 0, Math.PI*2); c.fill();
        c.strokeStyle = 'rgba(255,255,255,0.05)'; c.lineWidth = 2; c.stroke();
        c.restore();

        for(let id in this.activePlayers) {
            const p = this.activePlayers[id];
            const isMe = id === Net.myId;
            
            c.save();
            c.translate(p.x, p.y);
            
            if (isMe) {
                c.beginPath();
                c.arc(0, 0, p.r + 12, 0, Math.PI * 2);
                c.fillStyle = p.team === 'red' ? 'rgba(229, 57, 53, 0.15)' : 'rgba(30, 136, 229, 0.15)';
                c.fill();
            }

            c.fillStyle = 'rgba(0,0,0,0.3)';
            c.beginPath(); c.arc(0, 8, p.r, 0, Math.PI*2); c.fill();

            const pGrad = c.createRadialGradient(-p.r/3, -p.r/3, p.r/5, 0, 0, p.r);
            if (p.team === 'red') {
                pGrad.addColorStop(0, '#ef5350');
                pGrad.addColorStop(1, '#b71c1c');
            } else {
                pGrad.addColorStop(0, '#42a5f5');
                pGrad.addColorStop(1, '#0d47a1');
            }
            
            c.fillStyle = pGrad;
            c.beginPath(); c.arc(0,0,p.r,0,Math.PI*2); c.fill();
            
            c.strokeStyle = '#1a0b08';
            c.lineWidth = isMe ? 5 : 3;
            c.stroke();
            
            c.fillStyle = 'rgba(255,255,255,0.15)';
            c.beginPath();
            c.arc(0, -p.r/4, p.r/1.5, 0, Math.PI, true);
            c.fill();
            
            c.fillStyle = 'white';
            const eyeX = p.team === 'red' ? 14 : -14;
            c.beginPath(); c.arc(eyeX, -10, 5, 0, Math.PI*2); c.fill();
            c.beginPath(); c.arc(eyeX, 10, 5, 0, Math.PI*2); c.fill();
            
            c.fillStyle = '#1a0b08';
            c.beginPath(); c.arc(eyeX + (p.team==='red'?1:-1), -10, 2, 0, Math.PI*2); c.fill();
            c.beginPath(); c.arc(eyeX + (p.team==='red'?1:-1), 10, 2, 0, Math.PI*2); c.fill();
            
            c.restore();
            
            c.save();
            if(this.activePlayers[Net.myId] && this.activePlayers[Net.myId].team === 'blue') {
                c.translate(p.x, p.y + p.r + 25);
                c.rotate(Math.PI);
            } else {
                c.translate(p.x, p.y - p.r - 25);
            }

            c.font = '700 16px "Roboto Slab", serif';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            
            const textMetrics = c.measureText(p.name);
            c.fillStyle = 'rgba(0,0,0,0.6)';
            c.beginPath();
            c.roundRect(-textMetrics.width/2 - 12, -14, textMetrics.width + 24, 28, 14);
            c.fill();
            
            c.fillStyle = 'white';
            c.fillText(p.name, 0, 1);

            c.restore();
        }
    },

    loop(t) {
        if (!t) t = performance.now();
        let dt = (t - this.lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; 
        this.lastTime = t;
        
        this.update(dt);
        this.draw();
        
        this.animationFrameId = requestAnimationFrame((time) => this.loop(time));
    }
};

document.getElementById('btn-create').onclick = () => {
    document.getElementById('home-error').innerText = "";
    const rid = Math.floor(100000 + Math.random() * 900000).toString();
    Net.init(true, rid);
};

document.getElementById('btn-join').onclick = () => {
    document.getElementById('home-error').innerText = "";
    const rid = document.getElementById('input-room-id').value.trim();
    if (rid.length !== 6) return alert("Enter 6-digit ID");
    Net.init(false, rid);
};

document.getElementById('btn-copy').onclick = () => {
    navigator.clipboard.writeText(Net.room);
    document.getElementById('btn-copy').innerText = "COPIED!";
    setTimeout(() => document.getElementById('btn-copy').innerText = "COPY ID", 1500);
};

document.getElementById('win-points-select').onchange = (e) => {
    Net.maxScore = parseInt(e.target.value);
    Net.broadcastLobbyState();
};

document.getElementById('btn-start').onclick = () => {
    Net.maxScore = parseInt(document.getElementById('win-points-select').value);
    Net.broadcast('START_GAME', { players: Net.players, maxScore: Net.maxScore });
    Game.begin(Net.players);
};

AudioSystem.init();
Game.init();

document.getElementById('btn-welcome-ok').onclick = () => {
    document.getElementById('welcome-dialog').style.display = 'none';
};

document.getElementById('btn-fs').onclick = () => {
    const docElm = document.documentElement;

    const requestFullscreen = docElm.requestFullscreen || 
                              docElm.webkitRequestFullscreen || 
                              docElm.mozRequestFullScreen || 
                              docElm.msRequestFullscreen;
                              
    const exitFullscreen = document.exitFullscreen || 
                           document.webkitExitFullscreen || 
                           document.mozCancelFullScreen || 
                           document.msExitFullscreen;

    const isFullscreen = document.fullscreenElement || 
                         document.webkitFullscreenElement || 
                         document.mozFullScreenElement || 
                         document.msFullscreenElement;

    if (!isFullscreen) {
        if (requestFullscreen) {
            requestFullscreen.call(docElm).catch(() => {
                window.scrollTo(0, 1);
                alert("For best Full Screen experience on iPhone Safari: Tap the Share icon, then select 'Add to Home Screen'.");
            });
        } else {
            window.scrollTo(0, 1);
            alert("For best Full Screen experience on iPhone Safari: Tap the Share icon, then select 'Add to Home Screen'.");
        }
    } else {
        if (exitFullscreen) {
            exitFullscreen.call(document);
        }
    }
};

document.getElementById('btn-sound').onclick = () => AudioSystem.toggleMute();

history.pushState(null, null, location.href);
window.addEventListener('popstate', function(event) {
    history.pushState(null, null, location.href);
    document.getElementById('exit-dialog').style.display = 'flex';
});

document.getElementById('btn-exit-cancel').onclick = () => {
    document.getElementById('exit-dialog').style.display = 'none';
};

document.getElementById('btn-exit-ok').onclick = () => {
    if (Net.peer) {
        Net.peer.destroy();
    }
    window.removeEventListener('popstate', arguments.callee);
    history.back();
    
    setTimeout(() => {
        window.close();
    }, 100);
};
</script>
